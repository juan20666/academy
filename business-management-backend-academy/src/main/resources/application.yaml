spring:
  application:
    name: business-management-backend-academy

  datasource:
    url: jdbc:postgresql://localhost:5433/ms_auth
    username: postgres
    password: 2007
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: 8080

logging:
  level:
    com.datacenter.business_management_backend_academy: DEBUG